<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icone11.png" />

    <!-- Viewport pour mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ========== CONFIGURATION PWA GÉNÉRALE ========== -->
    <meta name="theme-color" content="#2D2422" />

    <!-- Manifest dynamique : admin ou client -->
    <script>
      (function() {
        const isAdmin = window.location.pathname.startsWith('/admin');
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = isAdmin ? '/manifest-admin.json' : '/manifest.json';
        document.head.appendChild(link);
      })();
    </script>

    <!-- ========== CONFIGURATION SPÉCIFIQUE iOS ========== -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Restaurant Signature" />

    <!-- Icônes iOS -->
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />

    <!-- Splash screens iOS -->
    <link rel="apple-touch-startup-image" href="/icons/splash-640x1136.png"   media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png"   media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2208.png"  media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1125x2436.png"  media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2688.png"  media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1536x2048.png"  media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1668x2224.png"  media="(device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-2048x2732.png"  media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />

    <!-- SEO -->
    <meta name="description" content="Restaurant Signature - Découvrez nos plats raffinés et commandez en ligne" />

    <title>Restaurant Signature</title>

    <!-- ========== OPTIMISATION POLICES GOOGLE (PRÉCHARGE) ========== -->
    <!-- Préconnexion aux domaines Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Chargement non bloquant des polices -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" 
      rel="preload" 
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Fallback pour éviter FOIT (Flash of Invisible Text) -->
    <style>
      /* Police de secours systeme */
      body {
        font-family: 'Playfair Display', 'Times New Roman', Georgia, serif;
      }
      .signature-text, p, button, input, textarea {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      /* Cacher le contenu pendant 1s max si police non chargée */
      html {
        scroll-behavior: smooth;
      }
    </style>

    <!-- ========== OPTIMISATION CSS CRITIQUE ========== -->
    <style>
      /* CSS critique pour le rendu initial */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #FCF9F5;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      /* Loader simple pour le suspense */
      .global-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #FCF9F5;
      }
      .global-loader::after {
        content: "🍽️";
        font-size: 3rem;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>

    <!-- ========== SERVICE WORKERS (chargement différé) ========== -->
    <script>
      // Délayer le chargement des Service Workers pour ne pas bloquer le rendu
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            // SW Firebase (notifications push) — scope racine
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
              .then(reg => console.log('✅ SW Firebase enregistré:', reg.scope))
              .catch(err => console.error('❌ SW Firebase erreur:', err));

            // SW Admin PWA — uniquement sur /admin
            if (window.location.pathname.startsWith('/admin')) {
              navigator.serviceWorker.register('/admin-sw.js', { scope: '/admin/' })
                .then(reg => console.log('✅ SW Admin enregistré:', reg.scope))
                .catch(err => console.error('❌ SW Admin erreur:', err));
            }
          }, 3000); // Attendre 3 secondes après le chargement
        });
      }
    </script>

    <!-- Préchargement des ressources critiques -->
    <link rel="preload" href="/icons/icon-180x180.png" as="image" />
    <link rel="preload" href="/images/hero.jpg" as="image" fetchpriority="high" />

  </head>
  <body>
    <div id="root">
      <!-- Loader visible pendant le chargement de l'application -->
      <div class="global-loader"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
